name: "Upload release assets (retrying)"
description: >
  Upload assets to a GitHub release via softprops/action-gh-release, retrying
  transient failures (e.g. "No server is currently available to service your
  request") up to 10 times. softprops is a Node action, so unlike the gh CLI it
  works inside container jobs (ubuntu/alpine images have no gh). Only adds
  assets; never changes the release name or body.

inputs:
  files:
    description: "Newline-separated files/globs to upload."
    required: true
  tag:
    description: "Release tag (tag_name). Empty falls back to the pushed tag."
    required: false
    default: ""
  fail_on_unmatched_files:
    description: "Fail if a files pattern matches nothing."
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - id: a1
      uses: softprops/action-gh-release@v3
      continue-on-error: true
      with:
        tag_name: ${{ inputs.tag }}
        files: ${{ inputs.files }}
        fail_on_unmatched_files: ${{ inputs.fail_on_unmatched_files }}
    - if: steps.a1.outcome == 'failure'
      shell: bash
      run: echo "::warning::release upload attempt 1 failed; retrying in 10s" && sleep 10
    - id: a2
      if: steps.a1.outcome == 'failure'
      uses: softprops/action-gh-release@v3
      continue-on-error: true
      with:
        tag_name: ${{ inputs.tag }}
        files: ${{ inputs.files }}
        fail_on_unmatched_files: ${{ inputs.fail_on_unmatched_files }}
    - if: steps.a2.outcome == 'failure'
      shell: bash
      run: echo "::warning::release upload attempt 2 failed; retrying in 15s" && sleep 15
    - id: a3
      if: steps.a2.outcome == 'failure'
      uses: softprops/action-gh-release@v3
      continue-on-error: true
      with:
        tag_name: ${{ inputs.tag }}
        files: ${{ inputs.files }}
        fail_on_unmatched_files: ${{ inputs.fail_on_unmatched_files }}
    - if: steps.a3.outcome == 'failure'
      shell: bash
      run: echo "::warning::release upload attempt 3 failed; retrying in 20s" && sleep 20
    - id: a4
      if: steps.a3.outcome == 'failure'
      uses: softprops/action-gh-release@v3
      continue-on-error: true
      with:
        tag_name: ${{ inputs.tag }}
        files: ${{ inputs.files }}
        fail_on_unmatched_files: ${{ inputs.fail_on_unmatched_files }}
    - if: steps.a4.outcome == 'failure'
      shell: bash
      run: echo "::warning::release upload attempt 4 failed; retrying in 30s" && sleep 30
    - id: a5
      if: steps.a4.outcome == 'failure'
      uses: softprops/action-gh-release@v3
      continue-on-error: true
      with:
        tag_name: ${{ inputs.tag }}
        files: ${{ inputs.files }}
        fail_on_unmatched_files: ${{ inputs.fail_on_unmatched_files }}
    - if: steps.a5.outcome == 'failure'
      shell: bash
      run: echo "::warning::release upload attempt 5 failed; retrying in 45s" && sleep 45
    - id: a6
      if: steps.a5.outcome == 'failure'
      uses: softprops/action-gh-release@v3
      continue-on-error: true
      with:
        tag_name: ${{ inputs.tag }}
        files: ${{ inputs.files }}
        fail_on_unmatched_files: ${{ inputs.fail_on_unmatched_files }}
    - if: steps.a6.outcome == 'failure'
      shell: bash
      run: echo "::warning::release upload attempt 6 failed; retrying in 60s" && sleep 60
    - id: a7
      if: steps.a6.outcome == 'failure'
      uses: softprops/action-gh-release@v3
      continue-on-error: true
      with:
        tag_name: ${{ inputs.tag }}
        files: ${{ inputs.files }}
        fail_on_unmatched_files: ${{ inputs.fail_on_unmatched_files }}
    - if: steps.a7.outcome == 'failure'
      shell: bash
      run: echo "::warning::release upload attempt 7 failed; retrying in 75s" && sleep 75
    - id: a8
      if: steps.a7.outcome == 'failure'
      uses: softprops/action-gh-release@v3
      continue-on-error: true
      with:
        tag_name: ${{ inputs.tag }}
        files: ${{ inputs.files }}
        fail_on_unmatched_files: ${{ inputs.fail_on_unmatched_files }}
    - if: steps.a8.outcome == 'failure'
      shell: bash
      run: echo "::warning::release upload attempt 8 failed; retrying in 90s" && sleep 90
    - id: a9
      if: steps.a8.outcome == 'failure'
      uses: softprops/action-gh-release@v3
      continue-on-error: true
      with:
        tag_name: ${{ inputs.tag }}
        files: ${{ inputs.files }}
        fail_on_unmatched_files: ${{ inputs.fail_on_unmatched_files }}
    - if: steps.a9.outcome == 'failure'
      shell: bash
      run: echo "::warning::release upload attempt 9 failed; retrying in 120s" && sleep 120
    - id: a10
      if: steps.a9.outcome == 'failure'
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ inputs.tag }}
        files: ${{ inputs.files }}
        fail_on_unmatched_files: ${{ inputs.fail_on_unmatched_files }}
