name: opencv-js-precompile

# Builds a CSP-clean opencv.js (runs under `script-src 'wasm-unsafe-eval'` with
# no `'unsafe-eval'`) from OpenCV source and publishes it as an immutable release
# asset. Single arch-independent target, so no build matrix. See
# scripts/build_opencv_js.sh for why this differs from stock only by
# -s DYNAMIC_EXECUTION=0 plus -s EMBIND_AOT=1.

on:
  workflow_dispatch:
    inputs:
      opencv_ver:
        description: "OpenCV version to build opencv.js for"
        required: false
        default: "5.0.0"
      embind_aot:
        description: "Pass -s EMBIND_AOT=1 (eval-free AND fast invokers; injected only at the opencv.js link)"
        type: boolean
        required: false
        default: true
      release_tag:
        description: "Existing release tag to upload opencv.js into (e.g. v1.0.1-rc.0). Empty = build + verify only. Never creates or moves a tag."
        required: false
        default: ""
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # the publish step creates the release and uploads assets
    env:
      # Proven-good pin for OpenCV 5.0.0 embind (needs C++17 since emsdk 4.0.20).
      EMSDK_VERSION: "4.0.20"
      # AOT on by default; only an explicit `false` from the dispatch input opts out
      # (tag pushes carry no input, so they get AOT too).
      OPENCV_JS_EMBIND_AOT: ${{ github.event.inputs.embind_aot == 'false' && '0' || '1' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve OpenCV version
        env:
          INPUT_VER: ${{ github.event.inputs.opencv_ver }}
        run: |
          if [ -n "$INPUT_VER" ]; then
            version="$INPUT_VER"
          elif [ "$GITHUB_REF_TYPE" = "tag" ]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="5.0.0"
          fi
          echo "OPENCV_VER=${version}" >> "$GITHUB_ENV"
          echo "building opencv.js for OpenCV ${version}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node (for the CSP verification)
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache Emscripten SDK
        id: cache-emsdk
        uses: actions/cache@v6
        with:
          key: emsdk-${{ env.EMSDK_VERSION }}
          path: ./emsdk

      - name: Install Emscripten SDK
        run: |
          if [ ! -d emsdk/.git ]; then
            git clone --depth 1 https://github.com/emscripten-core/emsdk.git emsdk
          fi
          cd emsdk
          ./emsdk install "${EMSDK_VERSION}"
          ./emsdk activate "${EMSDK_VERSION}"

      - name: Cache OpenCV source
        id: cache-opencv
        uses: actions/cache@v6
        with:
          key: opencv-src-${{ env.OPENCV_VER }}
          path: ./3rd_party

      - name: Download OpenCV source
        if: steps.cache-opencv.outputs.cache-hit != 'true'
        run: bash scripts/download_opencv.sh "${OPENCV_VER}" 3rd_party/cache 3rd_party/opencv

      - name: Build CSP-clean opencv.js
        run: |
          . ./emsdk/emsdk_env.sh
          sh scripts/build_opencv_js.sh "${OPENCV_VER}" "3rd_party/opencv/opencv-${OPENCV_VER}" out

      - name: Verify functional (eval allowed)
        run: node scripts/verify_opencv_js_csp.mjs out/opencv.js

      - name: Verify CSP-clean (eval disabled == no 'unsafe-eval')
        env:
          REQUIRE_NO_EVAL: "1"
        run: node --disallow-code-generation-from-strings scripts/verify_opencv_js_csp.mjs out/opencv.js

      - name: Scan for residual eval / new Function call sites
        run: |
          count=$(grep -oE "eval\(|new Function\(" out/opencv.js | wc -l | tr -d ' ')
          echo "eval( / new Function( occurrences: ${count}"
          if [ "${count}" != "0" ]; then
            echo "::warning::${count} eval/new Function occurrences (inspect; string literals/comments are benign, the eval-disabled verify step is the real gate)"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencv-js-${{ env.OPENCV_VER }}-csp-clean
          path: |
            out/opencv.js
            out/opencv.sha256
          if-no-files-found: error

      # Dispatch: attach the built assets to an EXISTING release, chosen by tag. We
      # assert the release exists first, so a typo can never create or move a tag
      # (`gh release upload` would otherwise not create tags anyway, but this is
      # explicit). --clobber replaces same-named assets on re-runs.
      - name: Upload opencv.js into existing release (no retag)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null
          echo "uploading opencv.js assets into existing release ${RELEASE_TAG} (no tag created or moved)"
          gh release upload "${RELEASE_TAG}" out/opencv.js out/opencv.sha256 --repo "${GITHUB_REPOSITORY}" --clobber

      # Tag push: create/update that tag's release with the assets.
      - name: Publish release asset (tag push)
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: opencv.js ${{ env.OPENCV_VER }} (CSP-clean)
          body: |
            CSP-clean opencv.js for OpenCV ${{ env.OPENCV_VER }}: the stock single-threaded,
            single-file WASM build with OpenCV's default whitelist, differing only by
            `-s DYNAMIC_EXECUTION=0` plus `-s EMBIND_AOT=1` (eval-free AND fast invokers),
            so it runs under `script-src 'wasm-unsafe-eval'` with no `'unsafe-eval'`.
            Verified by loading + exercising embind under Node's
            `--disallow-code-generation-from-strings`. `opencv.sha256` pins the exact bytes.
          files: |
            out/opencv.js
            out/opencv.sha256
          fail_on_unmatched_files: true
