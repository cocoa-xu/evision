name: linux-precompile-aarch64-cuda-gnu

on:
  workflow_dispatch:
    inputs:
      version:
        required: true
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  aarch64-linux-gnu-cuda:
    runs-on: ${{ matrix.pair.runner }}
    env:
      OTP_VERSION: "25.3.2.12"
      ELIXIR_VERSION: "1.17.3"
      TRIPLET: "aarch64-linux-gnu"
    strategy:
      fail-fast: false
      matrix:
        include:
          - pair:
              arch: aarch64-linux-gnu
              runner: ubicloud-standard-4-arm
              cuda_id: "12"
              cudnn_id: "8"
              os_image: "ubuntu:20.04"
              cuda_pin: "https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2004/sbsa/cuda-ubuntu2004.pin"
              cuda_deb: "https://developer.download.nvidia.com/compute/cuda/12.9.1/local_installers/cuda-repo-ubuntu2004-12-9-local_12.9.1-575.57.08-1_arm64.deb"
              cuda_toolkit: "cuda-toolkit-12-9"
              cudnn_deb: "https://mirrors.uwucocoa.moe/cuda/cudnn-local-repo-ubuntu2004-8.9.7.29_1.0-1_arm64.deb"
              cudnn_package: "libcudnn8-dev"
          - pair:
              arch: aarch64-linux-gnu
              runner: ubicloud-standard-4-arm
              cuda_id: "12"
              cudnn_id: "9"
              os_image: "ubuntu:20.04"
              cuda_pin: "https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2004/sbsa/cuda-ubuntu2004.pin"
              cuda_deb: "https://developer.download.nvidia.com/compute/cuda/12.9.1/local_installers/cuda-repo-ubuntu2004-12-9-local_12.9.1-575.57.08-1_arm64.deb"
              cuda_toolkit: "cuda-toolkit-12-9"
              cudnn_deb: "https://developer.download.nvidia.com/compute/cudnn/9.10.2/local_installers/cudnn-local-repo-ubuntu2004-9.10.2_1.0-1_arm64.deb"
              cudnn_package: "cudnn-cuda-12"
          - pair:
              arch: aarch64-linux-gnu
              runner: ubicloud-standard-4-arm
              cuda_id: "13"
              cudnn_id: "9"
              os_image: "ubuntu:22.04"
              cuda_pin: "https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2204/sbsa/cuda-ubuntu2204.pin"
              cuda_deb: "https://developer.download.nvidia.com/compute/cuda/13.3.0/local_installers/cuda-repo-ubuntu2204-13-3-local_13.3.0-610.43.02-1_arm64.deb"
              cuda_toolkit: "cuda-toolkit-13-3"
              cudnn_deb: "https://developer.download.nvidia.com/compute/cudnn/9.23.0/local_installers/cudnn-local-repo-ubuntu2204-9.23.0_1.0-1_arm64.deb"
              cudnn_package: "cudnn-cuda-13"

    name: aarch64-linux-gnu-cuda${{ matrix.pair.cuda_id }}-cudnn${{ matrix.pair.cudnn_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Get tagged version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            export INPUT_VERSION="${{ github.event.inputs.version }}"
            export TAGGED_VERSION="${INPUT_VERSION##*v}"
          else
            export TAGGED_VERSION="${GITHUB_REF##*/v}"
          fi
          echo "tag=${TAGGED_VERSION}" >> $GITHUB_OUTPUT

      - name: Cache OTP + Elixir tarballs
        uses: actions/cache@v6
        with:
          key: otp-elixir-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ env.TRIPLET }}
          path: |
            cache/otp/otp-*.tar.gz
            cache/elixir/elixir-*.tar.gz

      - name: Mix compile (with contrib modules)
        run: |
          ls -la
          cp -a .github/scripts/*.sh ./
          chmod +x *.sh
          mkdir -p artifacts
          ./script-to-build-gnu.sh "${{ matrix.pair.cuda_pin }}" "${{ matrix.pair.cuda_deb }}" "${{ matrix.pair.cuda_toolkit }}" "${{ matrix.pair.cuda_id }}" "${{ matrix.pair.cudnn_deb }}" "${{ matrix.pair.cudnn_package }}" "${{ matrix.pair.cudnn_id }}" "${{ env.OTP_VERSION }}" "${{ env.ELIXIR_VERSION }}" "${{ env.TRIPLET }}" "refs/tags/v${{ steps.version.outputs.tag }}" "${{ matrix.pair.os_image }}"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.tag }}
          files: |
            artifacts/*.tar.gz
            artifacts/*.sha256
