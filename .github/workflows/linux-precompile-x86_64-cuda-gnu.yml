name: linux-precompile-x86_64-cuda-gnu

on:
  workflow_dispatch:
    inputs:
      version:
        required: true
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  x86_64-linux-gnu-cuda:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - container: nvidia/cuda:12.9.1-devel-ubuntu22.04
            cuda_ver: "12.9.1"
            cuda_id: "12"
            cudnn_id: "8"
            cudnn_tarball: "https://developer.download.nvidia.com/compute/cudnn/redist/cudnn/linux-x86_64/cudnn-linux-x86_64-8.9.7.29_cuda12-archive.tar.xz"
          - container: nvidia/cuda:12.9.1-devel-ubuntu22.04
            cuda_ver: "12.9.1"
            cuda_id: "12"
            cudnn_id: "9"
            cudnn_tarball: "https://developer.download.nvidia.com/compute/cudnn/redist/cudnn/linux-x86_64/cudnn-linux-x86_64-9.11.0.98_cuda12-archive.tar.xz"
          - container: nvidia/cuda:13.3.0-devel-ubuntu22.04
            cuda_ver: "13.3.0"
            cuda_id: "13"
            cudnn_id: "9"
            cudnn_tarball: "https://developer.download.nvidia.com/compute/cudnn/redist/cudnn/linux-x86_64/cudnn-linux-x86_64-9.23.0.39_cuda13-archive.tar.xz"

    container: ${{ matrix.container }}
    env:
      # container env vars
      # ref link: https://github.com/elixir-nx/xla/blob/main/.github/workflows/release.yml
      ImageOS: ubuntu22
      LANG: en_US.UTF-8
      LANGUAGE: en_US:en
      LC_ALL: en_US.UTF-8
      DEBIAN_FRONTEND: noninteractive
      # evision related env vars
      MIX_ENV: prod
      OPENCV_VER: "5.0.0"
      ELIXIR_VERSION: "1.15.2"
      OTP_VERSION: "25"
      NIF_VERSION: "2.16"
      EVISION_PREFER_PRECOMPILED: "false"
      EVISION_GENERATE_LANG: "erlang,elixir"
      EVISION_ENABLE_CUDA: "true"
      PKG_CONFIG_PATH: "/usr/lib/x86_64-linux-gnu/pkgconfig"

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Get tagged version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            export INPUT_VERSION="${{ github.event.inputs.version }}"
            export TAGGED_VERSION="${INPUT_VERSION##*v}"
          else
            export TAGGED_VERSION="${GITHUB_REF##*/v}"
          fi
          echo "tag=${TAGGED_VERSION}" >> $GITHUB_OUTPUT

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y build-essential automake autoconf pkg-config bc m4 unzip zip curl git libssl-dev gzip python3 ca-certificates \
            locales curl wget cmake libeigen3-dev
          echo "${LANG} UTF-8" >> /etc/locale.gen
          locale-gen
          update-locale LANG=${LANG}

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Download and install cudnn
        run: |
          curl -fSL --retry 3 --retry-delay 5 "${{ matrix.cudnn_tarball }}" -o cudnn.tar.xz
          mkdir -p cudnn
          tar -xvf cudnn.tar.xz -C cudnn --strip-components=1
          rm -f cudnn.tar.xz
          cp -a cudnn/include/* /usr/local/cuda/include/
          if [ -d "$(pwd)/cudnn/lib" ]; then
            cp -a cudnn/lib/* /usr/local/cuda/lib64/
          fi
          if [ -d "$(pwd)/cudnn/lib64" ]; then
            cp -a cudnn/lib64/* /usr/local/cuda/lib64/
          fi
          rm -rf cudnn

      - name: Cache mix packages
        id: cache-mix-deps
        uses: actions/cache@v6
        with:
          key: deps-${{ hashFiles('mix.lock') }}-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}
          path: |
            ./deps

      - name: Get mix deps
        if: steps.cache-mix-deps.outputs.cache-hit != 'true'
        run: |
          mix deps.get

      - name: Cache OpenCV
        id: cache-opencv
        uses: actions/cache@v6
        with:
          key: opencv-with-contrib-${{ env.OPENCV_VER }}-${{ hashFiles('patches/**') }}
          path: |
            ./3rd_party

      - name: Download OpenCV
        if: steps.cache-opencv.outputs.cache-hit != 'true'
        run: |
          bash scripts/download_opencv.sh ${OPENCV_VER} 3rd_party/cache 3rd_party/opencv/
          bash scripts/download_opencv_contrib.sh ${OPENCV_VER} 3rd_party/cache 3rd_party/opencv/

      - name: Make CUDA driver stub findable
        # nvidia/cuda:*-devel images ship libcuda only as a stub in lib64/stubs,
        # which find_library does not search, so opencv_cudacodec fails to
        # configure. Symlink it to a standard path; the real driver resolves at
        # runtime on the user's machine.
        run: |
          stub=$(find /usr/local/cuda* -name libcuda.so -path '*stubs*' 2>/dev/null | head -1)
          echo "linking CUDA driver stub: ${stub}"
          ln -sf "${stub}" /usr/lib/x86_64-linux-gnu/libcuda.so
          ln -sf "${stub}" /usr/lib/x86_64-linux-gnu/libcuda.so.1
          ldconfig

      - name: Compile OpenCV
        run: |
          mix compile_opencv

      - name: Mix Compile
        run: |
          rm -f _build/${{ env.MIX_ENV }}/lib/evision/priv/evision.so
          mix compile
          ls -la ./lib/generated

      - name: Create precompiled library
        run: |
          export PKG_NAME=evision-nif_${{ env.NIF_VERSION }}-x86_64-linux-gnu-contrib-cuda${{ matrix.cuda_id }}-cudnn${{ matrix.cudnn_id }}-${{ steps.version.outputs.tag }}
          mkdir -p "${PKG_NAME}"

          export PRIV_DIR="$(pwd)/_build/${MIX_ENV}/lib/evision/priv"
          mv "${PRIV_DIR}/include" /tmp/include
          cp -a "${PRIV_DIR}" "${PKG_NAME}"
          cp -a lib/generated "${PKG_NAME}/elixir_generated"
          cp -a src/generated "${PKG_NAME}/erlang_generated"
          tar -czf "${PKG_NAME}.tar.gz" "${PKG_NAME}"
          rm -rf "${PKG_NAME}"
          ls -lah "${PKG_NAME}.tar.gz"
          mkdir -p artifacts
          mv "${PKG_NAME}.tar.gz" artifacts
          cd artifacts
          sha256sum "${PKG_NAME}.tar.gz" | tee "${PKG_NAME}.tar.gz.sha256"
          mv /tmp/include "${PRIV_DIR}/include"

      - name: Upload precompiled library
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.tag }}
          files: |
            artifacts/*.tar.gz
            artifacts/*.sha256
