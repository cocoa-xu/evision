name: zz-selftest-upload

# Throwaway self-test: proves .github/actions/upload-release works INSIDE a
# container job (the case that broke when it used the gh CLI). Uploads two dummy
# files via a multiline glob to a throwaway tag. Delete this workflow + the
# `ci-upload-selftest` release once it passes.
on:
  workflow_dispatch:

jobs:
  container-upload:
    runs-on: ubuntu-latest
    container: ubuntu:20.04
    permissions:
      contents: write
    steps:
      - name: Install git (container has none; mirrors the precompile jobs)
        run: apt-get update -qq && apt-get install -y -qq git ca-certificates
      - uses: actions/checkout@v4
      - name: Make dummy multiline assets
        shell: bash
        run: |
          mkdir -p artifacts
          echo "selftest ${GITHUB_SHA}" > artifacts/upload-selftest.txt
          echo "selftest-sha" > artifacts/upload-selftest.sha256
      - uses: ./.github/actions/upload-release
        with:
          tag: ci-upload-selftest
          files: |
            artifacts/*.txt
            artifacts/*.sha256
