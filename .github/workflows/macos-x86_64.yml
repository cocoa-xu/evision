name: macos-x86_64

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    paths-ignore:
      - 'assets/**'
      - '*.md'
      - '**/*.md'
      - 'LICENSE*'
      - 'examples/**'
      - 'nerves/**'
      - 'Makefile.win'
      - 'cc_toolchain/**'
      - 'c_src/windows_fix/windows_fix.cpp'
      - 'checksum.exs'
      - 'do_release.sh'
      - '.github/FUNDING.yml'
      - '.github/scripts/script-to-build-freebsd.sh'
      - '.github/workflows/nerves-*.yml'
      - '.github/workflows/linux-*.yml'
      - '.github/workflows/windows-*.yml'
      - '.github/workflows/freebsd-*'
      - '.github/workflows/test-*.yml'
      - '.github/workflows/macos-precompile.yml'
      - '.github/workflows/macos-apple-device-precompile.yml'
      - '.github/workflows/opencv-js-*.yml'
      - '.github/*manylinux*.sh'
  push:
    branches:
      - main
      - test-*
    paths-ignore:
      - 'assets/**'
      - '*.md'
      - '**/*.md'
      - 'LICENSE*'
      - 'examples/**'
      - 'nerves/**'
      - 'Makefile.win'
      - 'cc_toolchain/**'
      - 'c_src/windows_fix/windows_fix.cpp'
      - 'checksum.exs'
      - '.github/FUNDING.yml'
      - '.github/scripts/script-to-build-freebsd.sh'
      - '.github/workflows/nerves-*.yml'
      - '.github/workflows/linux-*.yml'
      - '.github/workflows/windows-*.yml'
      - '.github/workflows/freebsd-*.yml'
      - '.github/workflows/test-*.yml'
      - '.github/workflows/macos-precompile.yml'
      - '.github/workflows/opencv-js-*.yml'
      - '.github/*manylinux*.sh'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mix_test:
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-ci') }}
    runs-on: macos-15-intel
    env:
      OPENCV_VER: "5.0.0"
      MIX_ENV: "test"
      EVISION_PREFER_PRECOMPILED: "false"
      FFMPEG_VER: "6"
      OTP_VERSION: "25.3.2.2"
      ELIXIR_VERSION: "1.15.2"
      CMAKE_VER: "3.18.6"
    steps:
      - uses: actions/checkout@v7

      - name: Install FFmpeg, Erlang and Elixir
        run: |
          brew install autoconf coreutils curl git openssl wxwidgets asdf ffmpeg@6 eigen
          brew link ffmpeg@6
          
          export OTP_VERSION="${{ env.OTP_VERSION }}"
          export OTP_MAIN_VER="${OTP_VERSION%%.*}"
          curl -fsSO https://elixir-lang.org/install.sh
          sh install.sh "elixir@${{ env.ELIXIR_VERSION }}" "otp@${{ env.OTP_VERSION }}"
          
          export PATH="$HOME/.elixir-install/installs/otp/${{ env.OTP_VERSION }}/bin:$HOME/.elixir-install/installs/elixir/${{ env.ELIXIR_VERSION }}-otp-${OTP_MAIN_VER}/bin:$PATH"
          mix local.hex --force
          mix local.rebar --force

          asdf plugin add cmake
          asdf install cmake "${{ env.CMAKE_VER }}"
          asdf set --home cmake "${{ env.CMAKE_VER }}"

      - name: Cache mix packages
        id: cache-mix-deps
        uses: actions/cache@v6
        with:
          key: deps-${{ hashFiles('mix.lock') }}
          path: |
            ./deps

      - name: Get mix deps
        if: steps.cache-mix-deps.outputs.cache-hit != 'true'
        run: |
          export OTP_VERSION="${{ env.OTP_VERSION }}"
          export OTP_MAIN_VER="${OTP_VERSION%%.*}"
          export PATH="$HOME/.elixir-install/installs/otp/${{ env.OTP_VERSION }}/bin:$HOME/.elixir-install/installs/elixir/${{ env.ELIXIR_VERSION }}-otp-${OTP_MAIN_VER}/bin:$PATH"
          mix deps.get

      - name: Cache OpenCV source code
        id: cache-opencv
        uses: actions/cache@v6
        with:
          key: opencv-with-contrib-${{ env.OPENCV_VER }}-${{ hashFiles('patches/**') }}
          path: |
            ./3rd_party

      - name: Download OpenCV source code
        if: steps.cache-opencv.outputs.cache-hit != 'true'
        run: |
          bash scripts/download_opencv.sh ${OPENCV_VER} 3rd_party/cache 3rd_party/opencv/
          bash scripts/download_opencv_contrib.sh ${OPENCV_VER} 3rd_party/cache 3rd_party/opencv/

      - name: Cache compiled OpenCV
        id: cache-mix-compile_opencv
        uses: actions/cache@v6
        with:
          key: compiled-with-ffmpeg${{ env.FFMPEG_VER }}-opencv-${{ env.OPENCV_VER }}-x86_64-apple-darwin-${{ hashFiles('Makefile') }}-${{ hashFiles('py_src/*.py') }}-${{ hashFiles('patches/**') }}
          path: |
            ./_build/${{ env.MIX_ENV }}/lib/evision
            ./c_src/headers.txt
            ./c_src/configuration.private.hpp

      - name: Apply OpenCV patches
        # apply_patch.py is idempotent; run it unconditionally so the OpenCV
        # source tree is always patched before the build. The Makefile-driven
        # patch step is gated behind build stamps that the compiled-opencv
        # cache restores, so it cannot be relied on.
        shell: bash
        run: python3 patches/apply_patch.py "$(pwd)/3rd_party/opencv/opencv-${OPENCV_VER}" "${OPENCV_VER}"

      - name: Compile OpenCV
        if: steps.cache-mix-compile_opencv.outputs.cache-hit != 'true'
        run: |
          cmake --version

          export OTP_VERSION="${{ env.OTP_VERSION }}"
          export OTP_MAIN_VER="${OTP_VERSION%%.*}"
          export PATH="$HOME/.elixir-install/installs/otp/${{ env.OTP_VERSION }}/bin:$HOME/.elixir-install/installs/elixir/${{ env.ELIXIR_VERSION }}-otp-${OTP_MAIN_VER}/bin:$PATH"
          mix compile_opencv

      - name: Mix Compile
        run: |
          export OTP_VERSION="${{ env.OTP_VERSION }}"
          export OTP_MAIN_VER="${OTP_VERSION%%.*}"
          export PATH="$HOME/.elixir-install/installs/otp/${{ env.OTP_VERSION }}/bin:$HOME/.elixir-install/installs/elixir/${{ env.ELIXIR_VERSION }}-otp-${OTP_MAIN_VER}/bin:$PATH"

          rm -f _build/test/lib/evision/priv/evision.so

          rm -rf lib/generated && rm -rf src/generated
          mkdir -p lib/generated && mkdir -p src/generated

          mix compile

      - name: Compile once again but without optional deps
        run: |
          export OTP_VERSION="${{ env.OTP_VERSION }}"
          export OTP_MAIN_VER="${OTP_VERSION%%.*}"
          export PATH="$HOME/.elixir-install/installs/otp/${{ env.OTP_VERSION }}/bin:$HOME/.elixir-install/installs/elixir/${{ env.ELIXIR_VERSION }}-otp-${OTP_MAIN_VER}/bin:$PATH"
          mix compile --force --no-optional-deps

      - name: Cache testdata
        id: cache-mix-testdata
        uses: actions/cache@v6
        with:
          key: testdata-${{ hashFiles('test/downloading_list.txt') }}
          path: |
            ./test/testdata

      - name: Mix Test
        run: |
          # ulimit -c unlimited
          # /usr/libexec/PlistBuddy -c "Add :com.apple.security.get-task-allow bool true" tmp.entitlements
          # sudo touch /cores/test
          # export ERL_BASE="$(dirname $(dirname $(which erl)))"
          # export BEAM_SMP="$(find "${ERL_BASE}" -name beam.smp)"
          # codesign -s - -f --entitlements tmp.entitlements "${BEAM_SMP}"
          export OTP_VERSION="${{ env.OTP_VERSION }}"
          export OTP_MAIN_VER="${OTP_VERSION%%.*}"
          export PATH="$HOME/.elixir-install/installs/otp/${{ env.OTP_VERSION }}/bin:$HOME/.elixir-install/installs/elixir/${{ env.ELIXIR_VERSION }}-otp-${OTP_MAIN_VER}/bin:$PATH"
          find ./test -name '*_test.exs' -exec bash -c "echo {} && mix test --include require_downloading --include require_ffmpeg {}" \;
